[vision]
enabled: true

poll_interval_sec: 20
analysis_interval_sec: 67

warmup_time_sec: 1800   # 30 минут

[moonraker]
enabled: true
url: http://127.0.0.1:7125

[camera]
snapshot_url: http://192.168.1.95:8080/?action=snapshot

[model]
path: /models/ResNet18_int8.tflite
threshold: 0.5
num_threads: 2

[preprocess]
width: 640
height: 480

[logic]
defect_threshold: 5
mode: warn
